name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Build Web Application
      run: npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Emergency Config if Missing
      run: |
        if [ ! -f "capacitor.config.json" ]; then
          echo '{"appId": "com.gerry.aurassistent", "appName": "AuraAssistant", "webDir": "dist"}' > capacitor.config.json
        fi

    - name: Add Android Platform Online
      run: |
        npx cap add android || true

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Aura-Assistant-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk